<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeTalk AI | Secure Voice Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="shield-icon">🛡️</span>
                <h1>SafeTalk AI</h1>
            </div>
            <p class="subtitle">Secure, Multi-lingual Voice Assistant</p>
        </header>

        <main>
            <div class="voice-center">
                <div id="orb" class="orb"></div>
                <div id="waveform" class="waveform hidden">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>

            <div class="controls">
                <button id="recordBtn" class="primary-btn">
                    <span class="btn-icon">🎤</span>
                    <span id="btnText">Start Recording</span>
                </button>
                <button id="stopBtn" class="secondary-btn" disabled>
                    <span class="btn-icon">🛑</span>
                    <span>Stop</span>
                </button>
            </div>

            <div id="status" class="status-text">Ready to listen</div>

            <div id="resultCard" class="result-card hidden">
                <div class="card-section">
                    <h3>You said:</h3>
                    <p id="transcriptText"></p>
                </div>
                <div class="divider"></div>
                <div class="card-section">
                    <div class="response-header">
                        <h3>SafeTalk Response</h3>
                        <span id="langTag" class="badge">EN</span>
                    </div>
                    <p id="answerText"></p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 SafeTalk AI. All rights reserved.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
