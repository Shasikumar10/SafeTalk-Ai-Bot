<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SafeTalk AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>🛡️ SafeTalk AI</h1>
    <p class="subtitle">Voice-first, safe, explainable AI assistant</p>

    <div class="controls">
      <button id="recordBtn">🎙️ Start Recording</button>
      <span id="status">Idle</span>
    </div>

    <div class="result hidden" id="resultBox">
      <h3>Answer</h3>
      <p id="answerText"></p>

      <div class="meta">
        <span id="modeTag"></span>
        <span id="confidenceTag"></span>
      </div>

      <details>
        <summary>Sources</summary>
        <ul id="sourcesList"></ul>
      </details>

      <button id="speakBtn">🔊 Speak Answer</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
